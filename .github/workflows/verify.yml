name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: CLI smoke test
        run: sprue --version

      - name: Scaffold test instance
        run: sprue init /tmp/test-kb --identity 'CI smoke test.'

      - name: Verify scaffolded instance
        working-directory: /tmp/test-kb
        run: sprue verify

      - name: Run check-config
        run: python src/sprue/engine/scripts/check-config.py

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Check package contents
        run: python src/sprue/engine/scripts/check-package-contents.py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprue-wheel-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7
